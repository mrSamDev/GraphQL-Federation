version: "3.9"

services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: movie-gateway
    environment:
      ROUTER_PORT: 4000
      APOLLO_SUPERGRAPH_PATH: /app/supergraph.graphql
      USERS_GRAPHQL_URL: http://users:4001/graphql
      MOVIES_GRAPHQL_URL: http://movies:4002/graphql
      REVIEWS_GRAPHQL_URL: http://reviews:4003/graphql
      SEARCH_GRAPHQL_URL: http://search:4004/graphql
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-dev-public-key}
      NODE_ENV: production
    depends_on:
      users:
        condition: service_healthy
      movies:
        condition: service_healthy
      reviews:
        condition: service_healthy
      search:
        condition: service_healthy
      ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8088"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.movie-gateway.rule=Host(`api.movie.mrsamdev.xyz`)"
      - "traefik.http.routers.movie-gateway.entrypoints=websecure"
      - "traefik.http.routers.movie-gateway.tls.certresolver=letsencrypt"
      - "traefik.http.routers.movie-gateway.service=movie-gateway"
      - "traefik.http.services.movie-gateway.loadbalancer.server.port=4000"

  users:
    build:
      context: .
      dockerfile: services/users/Dockerfile
    container_name: users-service
    environment:
      PORT: 4001
      DATABASE_URL: file:/data/users.db
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://movie.mrsamdev.xyz
    volumes:
      - users_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - dokploy-network

  movies:
    build:
      context: .
      dockerfile: services/movies/Dockerfile
    container_name: movies-service
    environment:
      PORT: 4002
      DATABASE_URL: file:/data/movies.db
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://movie.mrsamdev.xyz
    volumes:
      - movies_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - dokploy-network

  reviews:
    build:
      context: .
      dockerfile: services/reviews/Dockerfile
    container_name: reviews-service
    environment:
      PORT: 4003
      DATABASE_URL: file:/data/reviews.db
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://movie.mrsamdev.xyz
    volumes:
      - reviews_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4003/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - dokploy-network

  search:
    build:
      context: .
      dockerfile: services/search/Dockerfile
    container_name: search-service
    environment:
      PORT: 4004
      DATABASE_URL: file:/data/search.db
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://movie.mrsamdev.xyz
      MOVIES_SERVICE_URL: http://movies:4002
      REVIEWS_SERVICE_URL: http://reviews:4003
    volumes:
      - search_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4004/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - dokploy-network

  ai:
    build:
      context: .
      dockerfile: services/ai/Dockerfile
    container_name: ai-service
    environment:
      PORT: 4005
      DATABASE_URL: file:/data/ai.db
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: https://movie.mrsamdev.xyz
      GROQ_API_KEY: ${GROQ_API_KEY}
      MOVIES_SERVICE_URL: http://movies:4002
      REVIEWS_SERVICE_URL: http://reviews:4003
      SEARCH_SERVICE_URL: http://search:4004
      GATEWAY_URL: http://gateway:4000
    volumes:
      - ai_data:/data
    depends_on:
      movies:
        condition: service_healthy
      reviews:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4005/health/live"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - dokploy-network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_GRAPHQL_ENDPOINT: https://api.movie.mrsamdev.xyz/graphql
    container_name: web-app
    environment:
      NODE_ENV: production
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.movie-web.rule=Host(`movie.mrsamdev.xyz`)"
      - "traefik.http.routers.movie-web.entrypoints=websecure"
      - "traefik.http.routers.movie-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.movie-web.service=movie-web"
      - "traefik.http.services.movie-web.loadbalancer.server.port=80"

volumes:
  users_data:
  movies_data:
  reviews_data:
  search_data:
  ai_data:

networks:
  dokploy-network:
    external: true
